# Example configuration for the publication analyzer. Copy to config.yaml and
# pass it with `-c config.yaml`. Set the Gemini API key via the environment
# (GEMINI_API_KEY / GOOGLE_API_KEY), not here.

model: gemini-2.5-flash

# Contact email for OpenAlex's faster, more reliable "polite pool" (optional).
# Can also be set via the PA_MAILTO environment variable.
mailto: ""

# How to fetch program pages when scraping: auto (default) | always | never.
# "auto" renders JS-heavy pages in a headless browser only when the static page
# looks unrendered (needs the optional 'playwright'; see requirements-render.txt).
# Can also be set via PA_RENDER or the --render flag.
render: auto

# Cap on Gemini requests per minute. The free tier allows only ~5/min, so a
# large scrape without throttling fires a burst, exhausts its retries on HTTP
# 429s, and aborts. Set this to stay safely under your tier's limit (e.g. 4 for
# the free tier). 0 (default) disables the throttle. Also: PA_RATE_LIMIT_RPM.
rate_limit_rpm: 0

# Journals counted as "top-tier". Names are matched after normalization
# (case/"The"/"&"-insensitive, trailing citation noise ignored) using an exact
# match. Omit this key to use the built-in default (Financial Times FT50 unioned
# with the UT Dallas UTD24 = 51 journals).
top_tier_journals:
  - Journal of Finance
  - Journal of Financial Economics
  - Review of Financial Studies
  - American Economic Review
  - Econometrica
