# Config for the automated daily scrape workflow (.github/workflows/daily-scrape.yml).
# Committed (unlike config.yaml) so CI can read it. No secrets here: the Gemini
# API key comes from the GEMINI_API_KEY secret and the OpenAlex contact email
# from the optional PA_MAILTO secret (both injected as env vars by the workflow).
model: gemini-2.5-flash
render: auto
# Free-tier Gemini allows ~5 req/min; throttle just under it so scrapes don't 429.
rate_limit_rpm: 4

# Financial Times FT50 (2026 refresh) — 50 journals, FT50 only (no UTD24 add).
top_tier_journals:
  - Academy of Management Annals
  - Academy of Management Journal
  - Academy of Management Review
  - Accounting, Organizations and Society
  - The Accounting Review
  - Administrative Science Quarterly
  - American Economic Review
