name: Daily program scrape

# Resumes the conference-program scrape a little each day (the free Gemini tier
# caps requests per day), then commits the new rows and refreshed FT50 rates.
# Idempotent: once every page is scraped this is a no-op.
#
# Requirements (Settings -> Secrets and variables -> Actions):
#   - GEMINI_API_KEY  (required) your Gemini API key
#   - PA_MAILTO       (optional) email for OpenAlex's faster "polite pool"
#
# NOTE: GitHub only runs `schedule` triggers from the default branch, so the
# automatic daily run starts once this file is on the default branch. Until then
# (and any time) you can run it manually: Actions tab -> "Daily program scrape"
# -> "Run workflow" -> pick the branch.

on:
  schedule:
    - cron: "0 9 * * *"   # 09:00 UTC daily, after the ~midnight-Pacific quota reset
  workflow_dispatch:
    inputs:
      branch:
        description: Branch whose data/ to update
        default: main

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.event.inputs.branch || 'main' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape (resumable, throttled)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PA_MAILTO: ${{ secrets.PA_MAILTO }}
        run: |
          python -m publication_analyzer -c config.ci.yaml \
            scrape data/sources.csv -o data/programs.csv

      - name: Refresh FT50 rates (best-effort)
        continue-on-error: true
        env:
          PA_MAILTO: ${{ secrets.PA_MAILTO }}
        run: |
          python -m publication_analyzer -c config.ci.yaml \
            analyze --programs data/programs.csv --output data/rates.csv

      - name: Commit & push updates
        if: always()   # commit whatever was scraped, even if a step later failed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/programs.csv data/programs.csv.progress.json data/rates.csv
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily scrape update ($(date -u +%F))"
            git push origin HEAD:"${TARGET_BRANCH}"
          fi
